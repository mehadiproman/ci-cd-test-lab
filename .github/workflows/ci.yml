name: CI/CD Pipeline for FastAPI

on:
  # Trigger on push to main branch
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'  # Ignore README changes
  
  # Trigger on pull requests
  pull_request:
    branches: [ main ]
  
  # Manual trigger
  workflow_dispatch:

env:
  # Docker registry
  REGISTRY: docker.io
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/fastapi-app

jobs:
  # ==========================================
  # TEST JOB
  # ==========================================
  test:
    runs-on: ubuntu-latest
    name: Run Tests & Linting
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      
      - name: Run linting (flake8)
        run: |
          echo "Running flake8 linting..."
          python -m flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          python -m flake8 app/ --count --max-complexity=10 --max-line-length=88 --statistics
      
      - name: Run tests with pytest
        run: |
          echo "Running pytest..."
          python -m pytest app/test_main.py -v --cov=app --cov-report=xml --cov-report=term
      
      - name: Upload test coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ==========================================
  # BUILD & PUSH JOB
  # ==========================================
  build-and-push:
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    
    # Only run if tests passed
    needs: test
    # Only push on main branch pushes (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ==========================================
  # DEPLOY TO EC2 (BONUS)
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to EC2
    
    # Only deploy after successful build
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to EC2 using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Pulling latest image..."
            docker pull ${{ env.IMAGE_NAME }}:latest
            
            echo "Stopping old container..."
            docker stop fastapi-app || true
            docker rm fastapi-app || true
            
            echo "Starting new container..."
            docker run -d \
              --name fastapi-app \
              --restart unless-stopped \
              -p 8000:8000 \
              -e INSTANCE_ID=EC2-Production \
              ${{ env.IMAGE_NAME }}:latest
            
            echo "Cleaning up old images..."
            docker system prune -af

      - name: Verify deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 10
            curl -f http://localhost:8000/health || exit 1
            echo "Deployment successful!"
