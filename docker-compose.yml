version: '3.8'

services:
  fastapi:
    build: .
    container_name: ci_cd_fastapi
    ports:
      - "8000:8000"
    environment:
      - INSTANCE_ID=Local-Dev
    volumes:
      - ./app:/app/app  # For hot-reloading during development
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
